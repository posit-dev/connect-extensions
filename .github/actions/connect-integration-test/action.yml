name: 'Run Connect Integration Test'
description: 'Run integration test for a single extension using with-connect'

inputs:
  extension-name:
    description: 'Name of extension to test'
    required: true
  connect-version:
    description: 'Connect version to test against'
    required: true
  connect-license:
    description: 'Posit Connect license'
    required: true

outputs:
  test_status:
    description: 'Status of the integration test'
    value: ${{ steps.run-test.outputs.status }}
  reports_path:
    description: 'Path to test reports'
    value: ${{ steps.run-test.outputs.reports_path }}

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v6

    - uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.extension-name }}.tar.gz
        path: integration/bundles

    - uses: astral-sh/setup-uv@v5
      with:
        pyproject-file: "./integration/pyproject.toml"

    - name: Install Python and test dependencies
      shell: bash
      working-directory: ./integration
      run: |
        uv python install
        uv venv
        uv pip install --upgrade -e .

    - name: Patch Connect config to use manylinux_2_28 R packages
      shell: bash
      run: |
        VERSION="${{ inputs.connect-version }}"
        if [ "$VERSION" = "preview" ]; then
          IMAGE="ghcr.io/posit-dev/connect-preview:daily"
        elif [ "$VERSION" = "release" ] || [ "$VERSION" = "latest" ]; then
          IMAGE="ghcr.io/posit-dev/connect:latest"
        else
          YEAR="${VERSION%%.*}"
          MINOR="${VERSION#*.}"; MINOR="${MINOR%%.*}"
          if [ "$YEAR" -gt 2026 ] || { [ "$YEAR" -eq 2026 ] && [ "$MINOR" -ge 4 ]; }; then
            IMAGE="ghcr.io/posit-dev/connect:$VERSION"
          else
            IMAGE="rstudio/rstudio-connect:jammy-$VERSION"
          fi
        fi
        docker pull --quiet "$IMAGE"
        docker run --rm "$IMAGE" cat /etc/rstudio-connect/rstudio-connect.gcfg \
          | sed 's|URL = https://[^ ]*/cran/__linux__/[^/]*/latest|URL = https://packagemanager.posit.co/cran/__linux__/manylinux_2_28/latest|g' \
          > ${{ github.workspace }}/.github/connect-runtime.gcfg

    - name: Start Connect
      id: connect
      uses: posit-dev/with-connect@main
      with:
        license: ${{ inputs.connect-license }}
        version: ${{ inputs.connect-version }}
        quiet: 'true'
        config-file: ${{ github.workspace }}/.github/connect-runtime.gcfg
        env: |
          CONNECT_SERVER_EMAILPROVIDER=None
          CONNECT_APPLICATIONS_PACKAGEAUDITINGENABLED=true

    - name: Provision Node.js runtime (nodejs extensions only)
      shell: bash
      run: |
        APPMODE=$(jq -r '.metadata.appmode // ""' extensions/${{ inputs.extension-name }}/manifest.json)
        if [ "$APPMODE" != "nodejs" ]; then
          echo "Not a Node.js extension; skipping Node provisioning."
          exit 0
        fi
        # The base Connect image ships no Node runtime. Install one into the running
        # container, enable Node in the mounted config, then restart so Connect picks
        # it up (Connect validates the Node executable at startup, so it must exist
        # before Node is enabled).
        NODE_VERSION=24.14.0
        CID="${{ steps.connect.outputs.CONTAINER_ID }}"
        # Download + unpack Node on the runner, then copy it in, rather than
        # installing inside the container. This avoids depending on the Connect
        # image having curl/tar/xz, which varies across versions and image updates.
        curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-x64.tar.xz" -o /tmp/node.tar.xz
        mkdir -p /tmp/node/${NODE_VERSION}
        tar -xJf /tmp/node.tar.xz -C /tmp/node/${NODE_VERSION} --strip-components=1
        docker exec "$CID" mkdir -p /opt/node
        docker cp /tmp/node/${NODE_VERSION} "$CID:/opt/node/${NODE_VERSION}"
        printf '\n[NodeJs]\nEnabled = true\nExecutable = /opt/node/%s/bin/node\n' "$NODE_VERSION" \
          >> ${{ github.workspace }}/.github/connect-runtime.gcfg
        docker restart "$CID"
        echo "Waiting for Connect to restart with Node enabled..."
        for i in $(seq 1 45); do
          if curl -fsS "${{ steps.connect.outputs.CONNECT_SERVER }}/__api__/server_settings" >/dev/null 2>&1; then
            echo "Connect is back up with Node enabled."
            exit 0
          fi
          sleep 2
        done
        echo "Connect did not come back up after restart:"
        docker logs "$CID" 2>&1 | tail -60
        exit 1

    - name: Set bootstrap admin email
      shell: bash
      working-directory: ./integration
      env:
        CONNECT_API_KEY: ${{ steps.connect.outputs.CONNECT_API_KEY }}
        CONNECT_SERVER: ${{ steps.connect.outputs.CONNECT_SERVER }}
      run: uv run tests/posit/connect/set_bootstrap_admin_email.py

    - name: Run tests
      id: run-test
      shell: bash
      working-directory: ./integration
      env:
        CONNECT_API_KEY: ${{ steps.connect.outputs.CONNECT_API_KEY }}
        CONNECT_SERVER: ${{ steps.connect.outputs.CONNECT_SERVER }}
        EXTENSION_NAME: ${{ inputs.extension-name }}
        CONNECT_VERSION: ${{ inputs.connect-version }}
        BUNDLE_BASE_PATH: ${{ github.workspace }}/integration/bundles
      run: |
        mkdir -p reports
        status=0
        uv run pytest -s --junit-xml=./reports/${{ inputs.connect-version }}.xml || status=$?
        echo "reports_path=$(pwd)/reports" >> $GITHUB_OUTPUT
        echo "status=$status" >> $GITHUB_OUTPUT
        exit $status

    - name: Stop Connect
      if: always() && steps.connect.outputs.CONTAINER_ID != ''
      uses: posit-dev/with-connect@main
      with:
        license: ${{ inputs.connect-license }}
        stop: ${{ steps.connect.outputs.CONTAINER_ID }}
